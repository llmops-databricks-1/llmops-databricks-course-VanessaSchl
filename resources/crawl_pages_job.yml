resources:
  jobs:
    crawl_pages_job:
      name: crawl-pages
      tags:
        project_name: "llmops-databricks-course-VanessaSchl"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: crawl_pages
          environment_key: default
          spark_python_task:
            python_file: ../notebooks/crawl_pages.py
