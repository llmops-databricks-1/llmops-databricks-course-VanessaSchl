resources:
  jobs:
    ingest_release_notes_job:
      name: ingest-release-notes
      tags:
        project_name: "llmops-databricks-course-VanessaSchl"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: ingest_release_notes
          environment_key: default
          spark_python_task:
            python_file: ../notebooks/ingest_release_notes.py
